server {
  listen 80;
  server_name _;

  if ($host ~* \.azurewebsites\.net$) {
    return 301 https://joshua-oropilla.dev$request_uri;
  }

  root /usr/share/nginx/html;
  index index.html;

  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
